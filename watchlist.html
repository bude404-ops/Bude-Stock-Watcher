<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Watchlist - BudE</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>📋 Leverage Watchlist</h1>
      <a href="index.html" class="back-btn">←</a>
    </header>

    <div class="add-bar">
      <input type="text" id="tickerInput" placeholder="Enter ticker (e.g. TQQQ)" maxlength="6">
      <button onclick="addWatch()">Add</button>
    </div>

    <div class="watchlist-tabs">
      <button class="tab-btn active" onclick="showTab('all')">All</button>
      <button class="tab-btn" onclick="showTab('leverage')">3x ETFs</button>
      <button class="tab-btn" onclick="showTab('alerts')">Alerts</button>
    </div>

    <div class="watchlist-full" id="watchlistFull"></div>

    <div class="export-bar">
      <button onclick="exportList()" class="btn-export">📋 Copy All</button>
      <button onclick="clearAll()" class="btn-clear">Clear</button>
    </div>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">🏠</a>
      <a href="heatmap.html" class="nav-item">🗺️</a>
      <a href="radar.html" class="nav-item">🚨</a>
      <a href="watchlist.html" class="nav-item active">📋</a>
    </nav>
  </div>

  <script>
    const PROXY_URL = 'https://query1.finance.yahoo.com/v8/finance/chart/';
    const LEVERAGE_TICKERS = ['TQQQ','SQQQ','UPRO','SPXU','SOXL','LABU','FAS','FAZ','UDOW','SDOW','UMDD','SMDD','UBOT','DRN','DPST','WEBL','WEBS'];
    
    let watchlist = JSON.parse(localStorage.getItem('bude_watchlist')) || ['TQQQ','SQQQ','UPRO','AAPL','NVDA'];
    let currentTab = 'all';

    async function fetchQuote(ticker) {
      try {
        const res = await fetch(`${PROXY_URL}${ticker}?interval=1d&range=1d`);
        const data = await res.json();
        const meta = data.chart.result[0].meta;
        return { 
          price: meta.regularMarketPrice, 
          change: ((meta.regularMarketPrice - meta.chartPreviousClose) / meta.chartPreviousClose) * 100, 
          vol: meta.regularMarketVolume || 0,
          prev: meta.chartPreviousClose
        };
      } catch {
        return { price: 100 + Math.random()*100, change: (Math.random()-0.5)*4, vol: Math.floor(Math.random()*10000000), prev: 100 };
      }
    }

    async function render() {
      const container = document.getElementById('watchlistFull');
      container.innerHTML = '';
      
      const filtered = currentTab === 'leverage' 
        ? watchlist.filter(t => LEVERAGE_TICKERS.includes(t))
        : currentTab === 'alerts'
        ? watchlist // will filter after data
        : watchlist;

      for (const ticker of filtered) {
        const d = await fetchQuote(ticker);
        const isLev = LEVERAGE_TICKERS.includes(ticker);
        const volM = (d.vol / 1000000).toFixed(1);
        const gap = ((d.price - d.prev) / d.prev * 100);
        const bigGap = Math.abs(gap) > 2;
        const decayWarn = isLev && Math.abs(d.change) < 1.5 && Math.abs(d.change) > 0.3;
        
        if (currentTab === 'alerts' && !bigGap && !decayWarn) continue;
        
        const div = document.createElement('div');
        div.className = `watch-full-row ${bigGap ? 'gap-alert' : ''} ${decayWarn ? 'decay-alert' : ''}`;
        div.innerHTML = `
          <div class="w-left">
            <div class="w-ticker">${ticker} ${isLev ? '<span class="lev-badge">3x</span>' : ''}</div>
            <div class="w-vol">Vol: ${volM}M ${decayWarn ? '<span class="decay-badge">⚠️ Decay</span>' : ''}</div>
          </div>
          <div class="w-right">
            <div class="w-price">${d.price.toFixed(2)}</div>
            <div class="w-change ${d.change >= 0 ? 'up' : 'down'}">${d.change >= 0 ? '+' : ''}${d.change.toFixed(2)}%</div>
          </div>
          <button class="w-del" onclick="removeWatch('${ticker}')">×</button>
        `;
        div.onclick = (e) => { if (!e.target.classList.contains('w-del')) window.open(`https://finance.yahoo.com/quote/${ticker}`, '_blank'); };
        container.appendChild(div);
      }
    }

    function showTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      render();
    }

    function addWatch() {
      const input = document.getElementById('tickerInput');
      const t = input.value.toUpperCase().trim();
      if (t && !watchlist.includes(t)) {
        watchlist.push(t);
        localStorage.setItem('bude_watchlist', JSON.stringify(watchlist));
        input.value = '';
        render();
      }
    }

    function removeWatch(ticker) {
      watchlist = watchlist.filter(x => x !== ticker);
      localStorage.setItem('bude_watchlist', JSON.stringify(watchlist));
      render();
    }

    function exportList() {
      const text = watchlist.join(', ');
      navigator.clipboard.writeText(text).then(() => alert('Copied: ' + text));
    }

    function clearAll() {
      if (confirm('Clear entire watchlist?')) {
        watchlist = [];
        localStorage.setItem('bude_watchlist', '[]');
        render();
      }
    }

    document.getElementById('tickerInput').addEventListener('keypress', e => { if (e.key === 'Enter') addWatch(); });
    document.addEventListener('DOMContentLoaded', () => { render(); setInterval(render, 30000); });
  </script>
</body>
</html>
