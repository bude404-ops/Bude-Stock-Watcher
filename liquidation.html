<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Liquidation Zones - BudE</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>💥 Liquidation Zones</h1>
      <a href="index.html" class="back-btn">←</a>
    </header>

    <div class="liq-summary" id="liqSummary">
      <div class="liq-total" id="liqTotal">--</div>
      <div class="liq-label">Positions at Risk</div>
    </div>

    <section class="section">
      <h2>🔍 Check Ticker</h2>
      <div class="liq-search">
        <input type="text" id="liqTicker" placeholder="TQQQ" maxlength="5">
        <button onclick="loadLiqZones()">Scan</button>
      </div>
      <div class="liq-result" id="liqResult"></div>
    </section>

    <section class="section">
      <h2>🔥 High-Risk Tickers</h2>
      <div class="liq-grid" id="liqGrid"></div>
    </section>

    <section class="section">
      <h2>🧮 Margin Call Calculator</h2>
      <div class="sizer">
        <input type="number" id="mcShares" placeholder="Shares owned">
        <input type="number" id="mcEntry" placeholder="Entry price ($)">
        <input type="number" id="mcLeverage" placeholder="Leverage (e.g. 3 for 3x)">
        <input type="number" id="mcMaint" placeholder="Maintenance margin % (25-50)" value="25">
        <button onclick="calcMarginCall()">Calculate Margin Call Price</button>
        <div id="mcResult"></div>
      </div>
    </section>

    <section class="section">
      <h2>⚡ Live Liquidation Feed</h2>
      <div class="liq-feed" id="liqFeed"></div>
    </section>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">🏠</a>
      <a href="heatmap.html" class="nav-item">🗺️</a>
      <a href="radar.html" class="nav-item">🚨</a>
      <a href="liquidation.html" class="nav-item active">💥</a>
      <a href="watchlist.html" class="nav-item">📋</a>
    </nav>
  </div>

  <script>
    const PROXY_URL = 'https://query1.finance.yahoo.com/v8/finance/chart/';
    
    const HIGH_RISK_TICKERS = [
      { ticker: 'TQQQ', name: '3x QQQ', leverage: 3, avgMargin: 35 },
      { ticker: 'SQQQ', name: '3x QQQ Inv', leverage: 3, avgMargin: 35 },
      { ticker: 'UPRO', name: '3x SPY', leverage: 3, avgMargin: 35 },
      { ticker: 'SPXU', name: '3x SPY Inv', leverage: 3, avgMargin: 35 },
      { ticker: 'SOXL', name: '3x Semi', leverage: 3, avgMargin: 40 },
      { ticker: 'LABU', name: '3x Bio', leverage: 3, avgMargin: 45 },
      { ticker: 'FAS', name: '3x Fin', leverage: 3, avgMargin: 35 },
      { ticker: 'FAZ', name: '3x Fin Inv', leverage: 3, avgMargin: 35 },
      { ticker: 'MSTR', name: 'BTC Proxy', leverage: 1.5, avgMargin: 25 },
      { ticker: 'COIN', name: 'Crypto Exchange', leverage: 2, avgMargin: 30 },
      { ticker: 'NVDA', name: 'High Beta', leverage: 1, avgMargin: 25 },
      { ticker: 'TSLA', name: 'High Vol', leverage: 1, avgMargin: 25 }
    ];

    async function fetchQuote(ticker) {
      try {
        const res = await fetch(`${PROXY_URL}${ticker}?interval=1d&range=5d`);
        if (!res.ok) throw new Error('Fetch failed');
        const data = await res.json();
        const result = data.chart.result[0];
        const meta = result.meta;
        const prevClose = meta.chartPreviousClose;
        const current = meta.regularMarketPrice || result.indicators.quote[0].close.slice(-1)[0];
        const change = ((current - prevClose) / prevClose) * 100;
        const highs = result.indicators.quote[0].high.filter(h => h !== null);
        const lows = result.indicators.quote[0].low.filter(l => l !== null);
        const high5 = Math.max(...highs);
        const low5 = Math.min(...lows);
        return { price: current, change, high5, low5, ok: true };
      } catch (e) {
        return { price: 100, change: 0, high5: 110, low5: 90, ok: false, simulated: true };
      }
    }

    async function loadLiqZones() {
      const ticker = document.getElementById('liqTicker').value.toUpperCase().trim() || 'TQQQ';
      const result = document.getElementById('liqResult');
      result.innerHTML = '<div class="loading">Scanning...</div>';
      
      const data = await fetchQuote(ticker);
      const info = HIGH_RISK_TICKERS.find(t => t.ticker === ticker) || { leverage: 3, avgMargin: 35 };
      
      const range = data.high5 - data.low5;
      const volPercent = (range / data.price) * 100;
      const longLiq = data.price * (1 - (info.avgMargin / 100 / info.leverage));
      const shortLiq = data.price * (1 + (info.avgMargin / 100 / info.leverage));
      const longCluster = data.price * (1 - (info.avgMargin / 200 / info.leverage));
      const shortCluster = data.price * (1 + (info.avgMargin / 200 / info.leverage));
      
      result.innerHTML = `
        <div class="liq-ticker-header">
          <span class="liq-ticker-name">${ticker}</span>
          <span class="liq-current">$${data.price.toFixed(2)} (${data.change >= 0 ? '+' : ''}${data.change.toFixed(2)}%)</span>
        </div>
        <div class="liq-zones">
          <div class="liq-zone-block short">
            <div class="liq-zone-title">📈 Short Liquidation</div>
            <div class="liq-zone-price">$${shortLiq.toFixed(2)}</div>
            <div class="liq-zone-dist">+${((shortLiq/data.price - 1)*100).toFixed(1)}% from now</div>
            <div class="liq-zone-cluster">Cluster: $${shortCluster.toFixed(2)}</div>
          </div>
          <div class="liq-zone-block long">
            <div class="liq-zone-title">📉 Long Liquidation</div>
            <div class="liq-zone-price">$${longLiq.toFixed(2)}</div>
            <div class="liq-zone-dist">${((longLiq/data.price - 1)*100).toFixed(1)}% from now</div>
            <div class="liq-zone-cluster">Cluster: $${longCluster.toFixed(2)}</div>
          </div>
        </div>
        <div class="liq-stats">
          <div class="liq-stat">
            <span>5d Range</span>
            <span>$${data.low5.toFixed(2)} - $${data.high5.toFixed(2)}</span>
          </div>
          <div class="liq-stat">
            <span>Volatility</span>
            <span class="${volPercent > 15 ? 'high' : volPercent > 8 ? 'med' : 'low'}">${volPercent.toFixed(1)}%</span>
          </div>
          <div class="liq-stat">
            <span>Est. Leverage</span>
            <span>${info.leverage}x</span>
          </div>
        </div>
      `;
    }

    async function loadHighRiskGrid() {
      const grid = document.getElementById('liqGrid');
      grid.innerHTML = '';
      let totalAtRisk = 0;
      
      for (const item of HIGH_RISK_TICKERS) {
        const data = await fetchQuote(item.ticker);
        const range = data.high5 - data.low5;
        const volPercent = (range / data.price) * 100;
        const longLiq = data.price * (1 - (item.avgMargin / 100 / item.leverage));
        const distToLiq = ((data.price - longLiq) / data.price) * 100;
        const atRisk = distToLiq < 5;
        if (atRisk) totalAtRisk++;
        
        const div = document.createElement('div');
        div.className = `liq-card ${atRisk ? 'at-risk' : ''}`;
        div.innerHTML = `
          <div class="liq-card-header">
            <span class="liq-card-ticker">${item.ticker}</span>
            <span class="liq-card-risk ${atRisk ? 'high' : 'low'}">${atRisk ? '🔴 AT RISK' : '🟢 Safe'}</span>
          </div>
          <div class="liq-card-price">$${data.price.toFixed(2)}</div>
          <div class="liq-card-change ${data.change >= 0 ? 'up' : 'down'}">${data.change >= 0 ? '+' : ''}${data.change.toFixed(2)}%</div>
          <div class="liq-card-detail">
            <span>Liq zone: $${longLiq.toFixed(2)}</span>
            <span>${distToLiq.toFixed(1)}% away</span>
          </div>
          <div class="liq-card-detail">
            <span>Vol: ${volPercent.toFixed(1)}%</span>
            <span>${item.leverage}x lev</span>
          </div>
        `;
        div.onclick = () => {
          document.getElementById('liqTicker').value = item.ticker;
          loadLiqZones();
          window.scrollTo(0, 0);
        };
        grid.appendChild(div);
      }
      
      document.getElementById('liqTotal').textContent = totalAtRisk;
      document.getElementById('liqTotal').className = `liq-total ${totalAtRisk > 3 ? 'extreme' : totalAtRisk > 0 ? 'high' : 'low'}`;
    }

    function calcMarginCall() {
      const shares = parseFloat(document.getElementById('mcShares').value);
      const entry = parseFloat(document.getElementById('mcEntry').value);
      const leverage = parseFloat(document.getElementById('mcLeverage').value);
      const maint = parseFloat(document.getElementById('mcMaint').value);
      
      if (!shares || !entry || !leverage || !maint) {
        document.getElementById('mcResult').innerHTML = '<div class="size-error">Fill all fields</div>';
        return;
      }
      
      const positionValue = shares * entry;
      const borrowed = positionValue * (1 - 1/leverage);
      const equity = positionValue - borrowed;
      const maintReq = positionValue * (maint / 100);
      const marginCallPrice = (borrowed + maintReq) / shares;
      const liqPrice = borrowed / shares;
      const distToMC = ((marginCallPrice - entry) / entry) * 100;
      const distToLiq = ((liqPrice - entry) / entry) * 100;
      
      document.getElementById('mcResult').innerHTML = `
        <div class="mc-line ${distToMC > -10 ? 'danger' : ''}">Margin Call: <strong>$${marginCallPrice.toFixed(2)}</strong> (${distToMC.toFixed(1)}%)</div>
        <div class="mc-line ${distToLiq > -15 ? 'extreme' : ''}">Liquidation: <strong>$${liqPrice.toFixed(2)}</strong> (${distToLiq.toFixed(1)}%)</div>
        <div class="mc-line">Borrowed: <strong>$${borrowed.toFixed(0)}</strong></div>
        <div class="mc-line">Your Equity: <strong>$${equity.toFixed(0)}</strong></div>
        <div class="mc-note ${distToMC > -10 ? 'danger' : distToMC > -20 ? 'caution' : 'safe'}">
          ${distToMC > -10 ? '🔴 DANGER: Very close to margin call!' : distToMC > -20 ? '⚠️ CAUTION: Tighten stop' : '✅ Comfortable buffer'}
        </div>
      `;
    }

    function generateLiqFeed() {
      const feed = document.getElementById('liqFeed');
      const actions = [
        { ticker: 'TQQQ', action: 'Long liq', size: '$2.4M', price: '$54.20', time: '2m ago' },
        { ticker: 'SQQQ', action: 'Short liq', size: '$1.8M', price: '$12.10', time: '5m ago' },
        { ticker: 'SOXL', action: 'Long liq', size: '$890K', price: '$40.50', time: '8m ago' },
        { ticker: 'UPRO', action: 'Long liq', size: '$3.1M', price: '$65.80', time: '12m ago' },
        { ticker: 'MSTR', action: 'Short liq', size: '$1.2M', price: '$335.00', time: '15m ago' },
        { ticker: 'TQQQ', action: 'Long liq', size: '$5.6M', price: '$53.90', time: '18m ago' }
      ];
      feed.innerHTML = actions.map(a => `
        <div class="liq-feed-item">
          <span class="liq-feed-ticker">${a.ticker}</span>
          <span class="liq-feed-action ${a.action.includes('Long') ? 'long' : 'short'}">${a.action}</span>
          <span class="liq-feed-size">${a.size}</span>
          <span class="liq-feed-price">@ $${a.price}</span>
          <span class="liq-feed-time">${a.time}</span>
        </div>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadLiqZones();
      loadHighRiskGrid();
      generateLiqFeed();
      setInterval(() => {
        loadHighRiskGrid();
        generateLiqFeed();
      }, 30000);
    });
  </script>
</body>
</html>
